rules:
  # ---------------------------------------------------------------------------
  # Seed rules. These are STARTING POINTS — high recall, low precision by design.
  # They surface candidates for the human checklist, not confirmed bugs.
  # Add one new rule per exploit case study (see docs/exploits/_TEMPLATE.md).
  # ---------------------------------------------------------------------------

  - id: spot-price-from-pool-reserves
    languages: [solidity]
    severity: WARNING
    message: >
      Price/value derived from live pool reserves or balanceOf — flash-loan
      manipulable. Checklist SC03. cf. Inverse Finance ($15.6M).
    patterns:
      - pattern-either:
          - pattern: $POOL.getReserves(...)
          - pattern: $TOKEN.balanceOf($POOL)

  - id: erc20-transfer-return-unchecked
    languages: [solidity]
    severity: WARNING
    message: >
      ERC20 transfer/transferFrom return value not checked; non-reverting tokens
      silently fail. Use SafeERC20. Checklist SC06.
    patterns:
      - pattern-either:
          - pattern: $T.transfer($TO, $AMT);
          - pattern: $T.transferFrom($FROM, $TO, $AMT);

  - id: external-call-before-state-update
    languages: [solidity]
    severity: WARNING
    message: >
      Low-level external call — verify Checks-Effects-Interactions (state written
      BEFORE the call). Checklist SC08. cf. Rari Capital ($80M).
    patterns:
      - pattern-either:
          - pattern: $A.call{value: $V}($D)
          - pattern: $A.call($D)

  - id: tx-origin-auth
    languages: [solidity]
    severity: ERROR
    message: "tx.origin used in a condition — phishing-vulnerable auth. Checklist SC01."
    patterns:
      - pattern: tx.origin

  - id: weak-randomness-source
    languages: [solidity]
    severity: WARNING
    message: >
      block.timestamp/prevrandao/blockhash used as randomness — manipulable.
      Use Chainlink VRF. Checklist: weak randomness.
    patterns:
      - pattern-either:
          - pattern: block.timestamp
          - pattern: block.prevrandao
          - pattern: blockhash(...)

  - id: arbitrary-external-call-target
    languages: [solidity]
    severity: WARNING
    message: >
      External call to a function-parameter address — arbitrary-call sink.
      Checklist SC06. cf. Dexible ($2M).
    patterns:
      - pattern: |
          function $F(..., address $TARGET, ...) $VIS {
            ...
            $TARGET.call(...);
            ...
          }

  # --- promoted from Solodit mining (2026-06-01) ---

  - id: balanceof-self-for-accounting
    languages: [solidity]
    severity: WARNING
    message: >
      Accounting derived from token.balanceOf(address(this)) — donation-attack
      surface; use internal accounting. Checklist Vault/SOL-AM-DA-1.
    patterns:
      - pattern-either:
          - pattern: $T.balanceOf(address(this))
          - pattern: address(this).balance

  - id: ecrecover-result-unvalidated
    languages: [solidity]
    severity: WARNING
    message: >
      ecrecover result must be checked against address(0) and the expected signer,
      and the digest must include nonce + chainId for replay safety.
      Checklist Signatures/SOL-Signature-1..4.
    patterns:
      - pattern: ecrecover(...)

  - id: swap-without-min-out-or-deadline
    languages: [solidity]
    severity: INFO
    message: >
      Swap/router call — confirm a non-zero minAmountOut and a deadline are passed
      (slippage/MEV protection). Checklist AMM/SOL-Defi-AS-1,2,11.
    patterns:
      - pattern-either:
          - pattern: $R.swapExactTokensForTokens(...)
          - pattern: $R.exactInput(...)
          - pattern: $R.exactInputSingle(...)

  # --- Ekubo callback calldata injection pattern (2026-05-05) ---

  - id: calldata-forwarding-in-payment
    languages: [solidity]
    severity: WARNING
    message: >-
      Payment/settlement function forwards arbitrary calldata to a callback via
      calldatacopy and verifies only its own balance increase. A malicious callback
      can use third-party standing approvals to fund repayment, turning the contract
      into a drain rail. Checklist SC02-CB-1. cf. Ekubo $1.4M (2026-05-05),
      SwapNet $17M (2026-01-25).
    pattern-either:
      - pattern: |
          function pay(...) external {
            ...
            calldatacopy(..., ..., sub(calldatasize(), ...));
            ...
            $CALLER.call(...);
            ...
            balanceOf(address(...));
            ...
          }
      - pattern: |
          function settle(...) external {
            ...
            calldatacopy(..., ..., sub(calldatasize(), ...));
            ...
            $CALLER.call(...);
            ...
            balanceOf(address(...));
            ...
          }

  # ---------------------------------------------------------------------------
  # Wargame-mined detectors (DVD v4 + Ethernaut), 2026-06-04. Seed rules.
  # ---------------------------------------------------------------------------
  - id: unauthenticated-meta-tx-sender
    languages: [solidity]
    severity: WARNING
    message: >-
      A forwarder appends a caller-supplied address to the forwarded calldata (ERC-2771
      `_msgSender()` source). If the appended `from` is not authenticated with an EIP-712
      signature + nonce, every downstream `_msgSender()` auth check is spoofable — an attacker
      acts as any victim. Checklist SC01. cf. DVD Naive Receiver. catalog: meta-tx-msgsender-spoof.
    pattern-either:
      - pattern: $T.call(abi.encodePacked($DATA, $FROM))
      - pattern: $T.call(abi.encodePacked($DATA, $FROM, ...))
    metadata:
      owasp-sc: [SC01]
      exploit-id: meta-tx-msgsender-spoof

  - id: selector-check-fixed-offset
    languages: [solidity]
    severity: WARNING
    message: >-
      A selector/role allow-list reads the guarded selector from a hard-coded calldata offset
      while a separate dynamic `bytes` buffer is forwarded. ABI offsets are attacker-controlled,
      so the validated bytes and the executed bytes can differ (ABI smuggling). Validate
      `actionData[:4]`, the bytes you actually dispatch. Checklist SC05. catalog: calldata-abi-smuggling.
    pattern-regex: '\b\w+\s*:=\s*calldataload\(0x[0-9a-fA-F]+\)'
    metadata:
      owasp-sc: [SC05, SC01]
      exploit-id: calldata-abi-smuggling

  - id: balance-equality-control-flow
    languages: [solidity]
    severity: WARNING
    message: >-
      Control flow gated on the raw contract balance. `selfdestruct`/coinbase/pre-funding can force
      the balance, so a strict `==` (or threshold) check can be bricked or triggered early. Gate on
      internal accounting and use `>=`. Checklist SC02/DoS. catalog: forced-ether-balance-assumption.
    pattern-either:
      - pattern: require(address(this).balance == $X, ...)
      - pattern: require(address(this).balance == $X)
      - pattern: if (address(this).balance == $X) { ... }
    metadata:
      owasp-sc: [SC02]
      exploit-id: forced-ether-balance-assumption

  - id: mandatory-push-payment
    languages: [solidity]
    severity: INFO
    message: >-
      A pushed value transfer to a stored/caller-chosen address is required to succeed. A recipient
      with a reverting `receive` can then veto the whole path (DoS griefing). Prefer pull payments
      and isolate per-recipient failure. Checklist SC10/DoS. catalog: dos-griefing-revert.
    pattern: |
      ($OK, $_) = $DST.call{value: $V}($ARG);
      require($OK, ...);
    metadata:
      owasp-sc: [SC10, SC02]
      exploit-id: dos-griefing-revert

